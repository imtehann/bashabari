<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard — BashabBari</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dashboard-layout {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 40px 24px;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
      align-items: start;
    }
    .dash-sidebar {
      position: sticky;
      top: calc(var(--nav-h) + 20px);
    }
    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .profile-avatar {
      width: 72px; height: 72px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 1.8rem; font-weight: 800;
      margin: 0 auto 16px;
    }
    .profile-name { font-size: 1.1rem; font-weight: 800; }
    .profile-email { font-size: .85rem; color: var(--text-muted); margin-top: 4px; }
    .profile-join { font-size: .78rem; color: var(--text-light); margin-top: 6px; }
    .dash-nav {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .dash-nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 18px;
      font-size: .9rem; font-weight: 500;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      transition: all .15s;
    }
    .dash-nav a:last-child { border-bottom: none; }
    .dash-nav a:hover { background: var(--bg); color: var(--primary); }
    .dash-nav a.active { background: var(--primary-light); color: var(--primary); font-weight: 700; }
    .dash-section-title {
      font-size: 1.1rem; font-weight: 800;
      margin-bottom: 20px;
    }
    @media (max-width: 860px) {
      .dashboard-layout { grid-template-columns: 1fr; }
      .dash-sidebar { position: static; }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="page-header">
    <div class="page-header-inner">
      <div class="breadcrumb"><a href="index.html">Home</a> / Dashboard</div>
      <h1>My Dashboard</h1>
      <p>Welcome back! Here's your rental activity overview.</p>
    </div>
  </div>

  <main>
    <div class="dashboard-layout">
      <!-- Sidebar -->
      <aside class="dash-sidebar">
        <div class="profile-card">
          <div class="profile-avatar" id="dashAvatar">U</div>
          <div class="profile-name" id="dashUserName">Loading…</div>
          <div class="profile-email" id="dashUserEmail"></div>
          <div class="profile-join" id="dashJoinDate"></div>
        </div>
        <nav class="dash-nav">
          <a href="dashboard.html" class="active">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Dashboard
          </a>
          <a href="saved.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            Saved Homes
          </a>
          <a href="listings.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            Browse Listings
          </a>
          <a href="#" onclick="Auth.logout(); return false;" style="color:var(--danger);">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
          </a>
        </nav>
      </aside>

      <!-- Main Content -->
      <div>
        <!-- Stats -->
        <div class="stats-grid" style="margin-bottom:32px;">
          <div class="stat-card">
            <div class="stat-number" id="statSaved">0</div>
            <div class="stat-label">Saved Homes</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Total Listings</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statVerified">0</div>
            <div class="stat-label">Verified Properties</div>
          </div>
        </div>

        <!-- Recent Saved -->
        <div style="margin-bottom:40px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="dash-section-title">Recently Saved</div>
            <a href="saved.html" style="font-size:.875rem;color:var(--primary);font-weight:600;">View all →</a>
          </div>
          <div class="listings-grid" id="recentSaved"></div>
        </div>

        <!-- Featured -->
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <div class="dash-section-title">Featured Listings</div>
            <a href="listings.html" style="font-size:.875rem;color:var(--primary);font-weight:600;">Browse all →</a>
          </div>
          <div class="listings-grid" id="featuredGrid"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="data.js"></script>
  <script src="main.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
