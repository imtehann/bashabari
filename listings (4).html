<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Listings — BashabBari</title>
  <meta name="description" content="Browse all rental listings in Dhaka. Filter by location, price, type and more." />
  <link rel="stylesheet" href="style.css" />
  <style>
    .listings-page {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 28px;
      align-items: start;
    }
    .filter-sidebar { position: sticky; top: calc(var(--nav-h) + 20px); }
    .filter-title {
      font-size: .95rem; font-weight: 800;
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .filter-clear {
      font-size: .78rem; color: var(--primary);
      font-weight: 600; cursor: pointer; border: none; background: none;
    }
    .listings-main {}
    .listings-topbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    #resultCount { font-size: .9rem; color: var(--text-muted); font-weight: 500; }
    .sort-wrap { display: flex; align-items: center; gap: 8px; }
    .sort-wrap label { font-size: .85rem; color: var(--text-muted); }
    #sortSelect {
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .875rem;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }
    .search-bar-listings {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    #searchInput {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .9rem;
      background: #fff;
      transition: border .2s;
    }
    #searchInput:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(26,86,219,.08); }
    .btn-search-submit {
      padding: 10px 20px;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: .875rem;
      border: none;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-search-submit:hover { background: var(--primary-dark); }
    #toggleFilters {
      display: none;
      padding: 9px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .875rem;
      font-weight: 600;
      background: #fff;
      cursor: pointer;
      align-items: center;
      gap: 6px;
    }
    @media (max-width: 860px) {
      .listings-page { grid-template-columns: 1fr; }
      .filter-sidebar { position: static; display: none; }
      .filter-sidebar.open { display: block; }
      #toggleFilters { display: flex; }
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <div class="page-header">
    <div class="page-header-inner">
      <div class="breadcrumb"><a href="index.html">Home</a> / Listings</div>
      <h1>Browse Rental Listings</h1>
      <p>Find your perfect home across Dhaka — no broker, no commission</p>
    </div>
  </div>

  <main>
    <div class="listings-page">
      <!-- Sidebar Filters -->
      <aside class="filter-sidebar" id="filterPanel">
        <div class="filter-panel">
          <div class="filter-title">
            Filters
            <button class="filter-clear" onclick="clearFilters()">Clear all</button>
          </div>

          <div class="filter-group">
            <label for="filterLocation">Location</label>
            <select class="filter-select" id="filterLocation">
              <!-- Populated by listings.js -->
            </select>
          </div>

          <div class="filter-group">
            <label for="filterType">Property Type</label>
            <select class="filter-select" id="filterType">
              <!-- Populated by listings.js -->
            </select>
          </div>

          <div class="filter-group">
            <label for="filterPrice">Price Range</label>
            <select class="filter-select" id="filterPrice">
              <!-- Populated by listings.js -->
            </select>
          </div>

          <div class="filter-group">
            <label for="filterRooms">Bedrooms</label>
            <select class="filter-select" id="filterRooms">
              <option value="">Any</option>
              <option value="1">1 Room</option>
              <option value="2">2 Rooms</option>
              <option value="3">3 Rooms</option>
              <option value="4">4 Rooms</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-checkbox">
              <input type="checkbox" id="filterVerified" />
              Verified only
            </label>
          </div>
        </div>
      </aside>

      <!-- Listings -->
      <div class="listings-main">
        <form class="search-bar-listings" id="searchForm">
          <button type="button" id="toggleFilters" onclick="document.getElementById('filterPanel').classList.toggle('open')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="8" y1="12" x2="16" y2="12"></line><line x1="10" y1="18" x2="14" y2="18"></line></svg>
            Filters
          </button>
          <input type="text" id="searchInput" placeholder="Search by area, title, type…" autocomplete="off" />
          <button type="submit" class="btn-search-submit">Search</button>
        </form>

        <div class="listings-topbar">
          <span id="resultCount">Loading…</span>
          <div class="sort-wrap">
            <label for="sortSelect">Sort:</label>
            <select id="sortSelect">
              <option value="newest">Newest first</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="popular">Most popular</option>
            </select>
          </div>
        </div>

        <div class="listings-grid" id="listingsGrid"></div>
        <div id="pagination"></div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="data.js"></script>
  <script src="main.js"></script>
  <script src="listings.js"></script>
</body>
</html>
